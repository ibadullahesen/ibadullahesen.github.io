<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxtarGet - Sürətli Yükləmə</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f3f4f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }
        /* Uptodown tipli kompakt kart */
        .app-card {
            width: 100%;
            max-width: 360px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #e5e7eb;
            transition: transform 0.2s ease;
        }
        .app-card:hover {
            transform: translateY(-2px);
        }
        .app-header {
            display: flex;
            padding: 16px;
            gap: 16px;
            align-items: center;
        }
        .app-icon {
            width: 72px;
            height: 72px;
            border-radius: 14px;
            object-fit: cover;
            flex-shrink: 0;
            background: #f9fafb;
            border: 1px solid #f1f5f9;
        }
        .app-info {
            flex-grow: 1;
            min-width: 0;
        }
        .app-title {
            font-size: 18px;
            font-weight: 700;
            color: #111827;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .app-dev {
            font-size: 13px;
            color: #2563eb;
            font-weight: 500;
        }
        .app-description {
            padding: 0 16px 12px 16px;
            font-size: 13px;
            color: #4b5563;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .download-section {
            padding: 12px 16px 16px 16px;
            border-top: 1px solid #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .dl-btn {
            background: #009688; /* Uptodown yaşılına yaxın */
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .dl-btn:hover {
            background: #00796b;
        }
        .file-meta {
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>
<body>

    <!-- Yükləmə Kartı -->
    <div class="app-card">
        <div class="app-header">
            <!-- Postimages-dən aldığınız kiçik ikon linkini bura qoyun -->
            <img class="app-icon" src="https://i.postimg.cc/9FbFL3dy/Whats-App-Image-2025-10-31-at-12-00-55.jpg" alt="İkon" onerror="this.src='https://via.placeholder.com/72?text=İkon'">
            
            <div class="app-info">
                <h1 class="app-title">AxtarGet Cleaner</h1>
                <span class="app-dev">AxtarGet.xyz</span>
                <div class="mt-1 flex items-center gap-1">
                    <span class="text-yellow-400 text-xs">★★★★★</span>
                    <span class="text-[11px] text-gray-400">(4.8)</span>
                </div>
            </div>
        </div>

        <!-- Haqqında Hissəsi -->
        <div class="app-description">
            Bu proqram vasitəsilə siz komputervizi bir toxunuşla süretlendirin.
        </div>

        <div class="download-section">
            <div class="file-meta">
                <div class="font-bold text-gray-600">v2.4.0</div>
                <div>97kb</div>
            </div>
            
            <!-- GitHub Linkinizi bura yerləşdirin -->
            <a href="https://raw.githubusercontent.com/ibadullahesen/ibadullahesen.github.io/main/AxtarGetCleaner.exe" class="dl-btn">
                Yüklə
            </a>
        </div>
    </div>

    <!-- Digər fayl üçün nümunə (istəsəniz kopyalayıb çoxalda bilərsiniz) -->
    <div class="app-card mt-4">
        <div class="app-header">
            <img class="app-icon" src="https://i.postimg.cc/XvM8z5YV/download-placeholder.png" alt="İkon">
            <div class="app-info">
                <h1 class="app-title">Android Aləti</h1>
                <span class="app-dev">AxtarGet Mobile</span>
            </div>
        </div>
        <div class="app-description">
            Smartfonlar üçün nəzərdə tutulmuş rəsmi APK tətbiqi.
        </div>
        <div class="download-section">
            <div class="file-meta">
                <div class="font-bold text-gray-600">v1.0.1</div>
                <div>8.2 MB</div>
            </div>
            <a href="https://github.com/istifadeci/proje/releases/latest/download/AxtarGet.apk" class="dl-btn" style="background: #2563eb;">
                Yüklə
            </a>
        </div>
    </div>

</body>
</html>
